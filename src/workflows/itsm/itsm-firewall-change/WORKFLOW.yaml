name: itsm-firewall-change
description: ITSM 防火墙策略变更（步骤随 context 动态解析）
version: "1.0"

steps:
  - name: policy_generation
    label: 生成配置 ZIP
    skill: firewall-policy-generator
    inputs:
      ticket_id: ${context.ticket_id}
      ticket_title: ${context.ticket_title}
      policy_file_url: ${context.policy_file_url}
      topology_file_url: ${context.topology_file_url}
      requester: ${context.requester}
      assignee: ${context.assignee}
      priority: ${context.priority}
      parameters: ${context.parameters}
      change_background: ${context.change_background}
      change_purpose: ${context.change_purpose}
      requester_dept: ${context.requester_dept}
      due_date: ${context.due_date}
      workflow_run_id: ${run.id}

  - name: change_ticket
    label: 编写变更工单 Excel
    skill: itsm-change-ticket-writer
    inputs:
      ticket_id: ${context.ticket_id}
      ticket_title: ${context.ticket_title}
      change_background: ${context.change_background}
      change_purpose: ${context.change_purpose}
      requester: ${context.requester}
      requester_dept: ${context.requester_dept}
      priority: ${context.priority}
      due_date: ${context.due_date}
      assignee: ${context.assignee}
      manifest: ${steps.policy_generation.result.manifest}
      config_file_key: ${steps.policy_generation.artifacts.config_zip.file_key}
      config_files_url: ${steps.policy_generation.artifacts.config_zip.download_url}
      workflow_run_id: ${run.id}

  - name: itsm_callback
    label: 回调 ITSM
    skill: itsm-callback
    when: ${context.callback_url}
    inputs:
      ticket_id: ${context.ticket_id}
      callback_url: ${context.callback_url}
      callback_headers: ${context.callback_headers}
      change_excel_url: ${steps.change_ticket.artifacts.change_excel.download_url}
      change_excel_file_key: ${steps.change_ticket.artifacts.change_excel.file_key}
      config_files_url: ${steps.policy_generation.artifacts.config_zip.download_url}
      config_file_key: ${steps.policy_generation.artifacts.config_zip.file_key}
      workflow_run_id: ${run.id}

on_complete:
  message: ITSM 变更流程已完成
  notification:
    title: "变更工单已完成 (${context.ticket_id})"
    body: "防火墙策略与变更工单已生成。"
    level: success
