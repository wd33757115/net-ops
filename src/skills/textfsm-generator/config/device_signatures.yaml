detection_rules:
  - vendor: H3C
    command: display version
    pattern: '(?im)^H3C\s+(?P<model>[A-Z0-9][A-Z0-9-]+)\s+uptime\b'
    confidence: 0.99
  - vendor: Cisco
    command: show version
    pattern: '(?im)^\s*cisco\s+Nexus9000\s+(?P<model>C[0-9A-Z-]+)\s+Chassis\b'
    confidence: 0.99
  - vendor: Cisco
    command: show version
    pattern: '(?im)^\s*cisco\s+(?P<model>WS-C[0-9A-Z-]+)\s+\('
    confidence: 0.99
  - vendor: Cisco
    command: show version
    pattern: '(?im)^\s*cisco\s+(?P<model>ISR[0-9A-Z/-]+)\s+\('
    confidence: 0.99
  - vendor: H3C
    command: display device manuinfo
    pattern: '(?im)^DEVICE_NAME\s*:\s*(?P<model>[A-Z0-9][A-Z0-9-]+)\s*$'
    confidence: 0.97
  - vendor: Cisco
    command: show inventory
    pattern: '(?im)^PID:\s*(?P<model>(?:N9K|WS-C|ISR)[^,\s]+)'
    confidence: 0.97

normalization:
  - pattern: '^C(9364C|93180YC-FX)$'
    replacement: 'N9K-C\1'

families:
  - vendor: H3C
    family: Comware7
    model_patterns: ['^(S|MSR)']
  - vendor: Cisco
    family: NXOS9K
    model_patterns: ['^N9K-']
  - vendor: Cisco
    family: IOS-C2960
    model_patterns: ['^WS-C2960']
  - vendor: Cisco
    family: IOS-XE-ISR
    model_patterns: ['^ISR']

filename_hints:
  - {pattern: 'S6860', vendor: H3C, model: S6860-54HF, confidence: 0.55}
  - {pattern: '5130S', vendor: H3C, model: S5130S-54S-HI-G, confidence: 0.55}
  - {pattern: 'RT5620', vendor: H3C, model: MSR5620, confidence: 0.55}
  - {pattern: '6520XP', vendor: H3C, model: S6520XP-54XG-EI-G, confidence: 0.55}
  - {pattern: '6850', vendor: H3C, model: S6850-56HF, confidence: 0.55}
  - {pattern: 'N9364C', vendor: Cisco, model: N9K-C9364C, confidence: 0.55}
  - {pattern: 'N93180', vendor: Cisco, model: N9K-C93180YC-FX, confidence: 0.55}
  - {pattern: 'AR4451', vendor: Cisco, model: ISR4451-X/K9, confidence: 0.55}
