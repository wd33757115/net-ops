device_version:
  entity_type: device
  primary_keys: [model]
  required_fields: [model, os_version]
  optional_fields: [software_release, uptime]
  ignore_fields: [uptime]

inventory:
  entity_type: inventory_component
  primary_keys: [component, serial]
  required_fields: [component, name]
  optional_fields: [pid, serial, vendor]

cpu:
  entity_type: cpu
  primary_keys: [slot]
  required_fields: [slot, cpu_5s, cpu_1m, cpu_5m]
  optional_fields: []
  validators:
    cpu_5s: {type: percent}
    cpu_1m: {type: percent}
    cpu_5m: {type: percent}

memory:
  entity_type: memory
  primary_keys: [slot]
  required_fields: [slot, total, used, free, usage]
  optional_fields: []
  validators:
    usage: {type: percent}

system_resources:
  entity_type: system_resource
  primary_keys: [slot]
  required_fields: [slot, cpu_5s, total, used, free]
  optional_fields: [cpu_1m, cpu_5m, usage]
  validators:
    cpu_5s: {type: percent}
    cpu_1m: {type: percent}
    cpu_5m: {type: percent}
    usage: {type: percent}

interface_l3:
  entity_type: interface_l3
  primary_keys: [interface]
  required_fields: [interface, status, protocol]
  optional_fields: [ip_address, description]
  allow_empty: true
  empty_patterns:
    - '(?is)IP Interface Status for VRF.*Interface\s+IP Address\s+Interface Status\s*$'

interface_l2:
  entity_type: interface_l2
  primary_keys: [interface]
  required_fields: [interface, status]
  optional_fields: [vlan, duplex, speed, description, type]

fan:
  entity_type: fan
  primary_keys: [slot, fan]
  required_fields: [slot, fan, state]
  optional_fields: [speed, direction, model]

power:
  entity_type: power_supply
  primary_keys: [slot, power_supply]
  required_fields: [slot, power_supply, state]
  optional_fields: [model, output_watts, input_watts, capacity_watts]

temperature:
  entity_type: temperature_sensor
  primary_keys: [slot, sensor]
  required_fields: [slot, sensor, temperature]
  optional_fields: [state, warning_threshold, alarm_threshold]

environment:
  entity_type: environment_sensor
  primary_keys: [component, location]
  required_fields: [component, location, state]
  optional_fields: [reading, unit]

vrrp:
  entity_type: vrrp
  primary_keys: [interface, group]
  required_fields: [interface, group, state]
  optional_fields: [virtual_ip, master_ip, priority]
  allow_empty: true
  empty_patterns:
    - '(?i)VRRP4 is not configured'

redundancy:
  entity_type: redundancy_member
  primary_keys: [member]
  required_fields: [member, role, state]
  optional_fields: [peer, priority, description]
  allow_empty: true
  empty_patterns:
    - '(?i)not configured'
    - '(?i)incomplete command'
