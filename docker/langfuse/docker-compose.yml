# Langfuse v2 自托管（NetOps 开发环境，仅需 Postgres）
# 启动：docker compose -f docker/langfuse/docker-compose.yml up -d
# UI：http://localhost:3001
# 登录：admin@netops.local / netops-langfuse-admin

services:
  langfuse-db:
    image: postgres:16-alpine
    container_name: netops-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langfuse:
    image: docker.io/langfuse/langfuse:2
    container_name: netops-langfuse-standalone
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: netops-langfuse-nextauth-secret-2026
      SALT: netops-langfuse-salt-2026
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: netops-org
      LANGFUSE_INIT_ORG_NAME: NetOps Agent
      LANGFUSE_INIT_PROJECT_ID: netops-agent
      LANGFUSE_INIT_PROJECT_NAME: NetOps Agent
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-netops-public-dev-2026
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-netops-secret-dev-2026
      LANGFUSE_INIT_USER_EMAIL: admin@netops.local
      LANGFUSE_INIT_USER_NAME: NetOps Admin
      LANGFUSE_INIT_USER_PASSWORD: netops-langfuse-admin
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  langfuse_pg_data:
