# 测试/开发环境：仅启动中间件（PostgreSQL、Redis、RabbitMQ、MinIO、Qdrant）
# 应用层（FastAPI / Django / React）由 scripts/test/start.ps1 本地进程启动

networks:
  netops-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  rabbitmq-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: netops-postgres
    environment:
      POSTGRES_DB: netops_agent
      POSTGRES_USER: netops
      POSTGRES_PASSWORD: netops123456
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U netops -d netops_agent" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - netops-network

  redis:
    image: redis:7-alpine
    container_name: netops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - netops-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: netops-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - netops-network

  minio:
    image: minio/minio:latest
    container_name: netops-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - netops-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: netops-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:6333/readyz 2>/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - netops-network
