# 生产覆盖层：与 docker-compose.yml 叠加使用
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# 作用：中间件端口仅绑定 127.0.0.1；应用仍可通过本机 Nginx 反代对外。

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  rabbitmq:
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"

  minio:
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  qdrant:
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"

  langfuse:
    ports:
      - "127.0.0.1:3001:3000"

  django:
    ports:
      - "127.0.0.1:8001:8001"

  react:
    ports:
      - "127.0.0.1:3000:80"
